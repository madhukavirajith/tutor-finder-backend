# application.yml
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/tutor_db?createDatabaseIfNotExist=true
    username: root
    password: 2555
  jpa:
    hibernate:
      ddl-auto: update # This automatically creates tables for us (Magic!)
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

server:
  port: 8080